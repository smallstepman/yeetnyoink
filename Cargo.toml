[package]
name = "niri-deep"
version = "0.1.0"
edition = "2021"

[dependencies]
niri-ipc = "=25.11.0"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
